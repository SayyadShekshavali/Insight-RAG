version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: insight-rag-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - insight-network

  redis:
    image: redis:7-alpine
    container_name: insight-rag-redis
    ports:
      - "6379:6379"
    networks:
      - insight-network

  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: insight-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - insight-network

  python-ai:
    build:
      context: ../
      dockerfile: docker/python-ai.Dockerfile
    container_name: insight-rag-python-ai
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    networks:
      - insight-network

  server:
    build:
      context: ../
      dockerfile: docker/server.Dockerfile
    container_name: insight-rag-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/insight-rag
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-dev-access-secret-32-chars-at-least-please-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-secret-32-chars-at-least-please-change-in-production}
      - PYTHON_AI_URL=http://python-ai:8000
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_CALLBACK_URL=http://localhost:5000/api/integrations/callback/github
    depends_on:
      - mongo
      - redis
      - python-ai
    networks:
      - insight-network

  client:
    build:
      context: ../
      dockerfile: docker/client.Dockerfile
    container_name: insight-rag-client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - server
    networks:
      - insight-network

  nginx:
    image: nginx:alpine
    container_name: insight-rag-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    networks:
      - insight-network

volumes:
  mongo_data:
  qdrant_data:

networks:
  insight-network:
    driver: bridge
